services:
  streamrip:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Passa o UID e GID do usuário atual do host para o container
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: streamrip:latest
    container_name: streamrip
    # Executa como o usuário do host (não como root)
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    volumes:
      # Diretório de configuração (onde ficará o config.toml)
      - ./config:/config
      # Diretório de downloads
      - ./downloads:/downloads
    environment:
      - HOME=/config
    stdin_open: true
    tty: true
    # Remove o comando padrão para permitir execução interativa
    entrypoint: ["rip"]
