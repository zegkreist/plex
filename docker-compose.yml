version: "3.8"

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Lisbon
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,utility
    volumes:
      - ./config:/config
      - ./tv:/tv
      - ./movies:/movies
      - ./music:/music
    restart: unless-stopped

  musicsage:
    build:
      context: .
      dockerfile: musicsage/Dockerfile
    image: musicsage:latest
    container_name: musicsage
    depends_on:
      - plex
    ports:
      - "${MUSICSAGE_PORT:-3002}:3002"
    environment:
      - PLEX_URL=http://192.168.15.94:32400
      - PLEX_CONFIG_DIR=/plex-config
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.15.94:11434}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-gemma4:e4b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - PLEX_MEDIA_PATH=/media
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
    volumes:
      - musicsage-data:/data
      - ./musicsage-logs:/data/logs
      - ./config:/plex-config:ro
      - ./music:/media/music:ro
      - ./movies:/media/movies:ro
      - ./tv:/media/tv:ro
      - musicsage-downloads:/downloads
    network_mode: host
    restart: unless-stopped

volumes:
  musicsage-data:
  musicsage-downloads:
