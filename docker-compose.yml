version: "3.8"

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Lisbon
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,utility
    volumes:
      - ./config:/config
      - ./tv:/tv
      - ./movies:/movies
      - ./music:/music
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    user: "${PUID:-1000}:${PGID:-1000}"
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HOME=/home/ollama
      - OLLAMA_MODELS=/home/ollama/.ollama
    volumes:
      - ./ollama:/home/ollama/.ollama
    restart: unless-stopped
