version: "3.8"

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    runtime: nvidia
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=Europe/Lisbon
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,utility
    volumes:
      - ./config:/config
      - ./tv:/tv
      - ./movies:/movies
      - ./music:/music
    restart: unless-stopped

  mediasage:
    image: ecwilson/mediasage:latest
    container_name: mediasage
    ports:
      - "5765:5765"
    environment:
      - PLEX_URL=http://192.168.15.94:32400
      - PLEX_TOKEN=T3p39zpTTpBHBA7eUZk-
      - PLEX_MUSIC_LIBRARY=${PLEX_MUSIC_LIBRARY:-Music}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      # LLM: Ollama rodando fora do container
      - LLM_PROVIDER=ollama
      - OLLAMA_URL=http://192.168.15.94:11434
      - OLLAMA_CONTEXT_WINDOW=25768
    volumes:
      # Persist library cache across restarts
      # Ensure directory is writable: either set 'user' above, or run:
      #   mkdir -p ./mediasage && chmod 777 ./mediasage
      - ./mediasage:/app/data
      # Optional: persist UI settings
      # - ./mediasage/config.user.yaml:/app/config.user.yaml
    restart: unless-stopped
