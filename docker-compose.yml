version: "3.8"

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ./config:/config
      - ./tv:/tv
      - ./movies:/movies
      - ./music:/music
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri # Para aceleração de hardware (opcional)

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
    # Descomente as linhas abaixo se tiver GPU NVIDIA
